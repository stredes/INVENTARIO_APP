name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        shell: powershell
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Install Inno Setup
        shell: powershell
        run: |
          choco install innosetup -y --no-progress

      - name: Build release artifacts
        shell: powershell
        run: |
          .\build_release.ps1

      - name: Create or update GitHub release
        shell: powershell
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_REF_NAME: ${{ github.ref_name }}
        run: |
          $ErrorActionPreference = 'Stop'
          $repo = $env:GITHUB_REPOSITORY
          $tag = if ($env:GITHUB_REF_NAME) { $env:GITHUB_REF_NAME } else { "v0.0.0-dev" }
          $headers = @{
            Authorization = "Bearer $env:GITHUB_TOKEN"
            Accept = "application/vnd.github+json"
            "X-GitHub-Api-Version" = "2022-11-28"
          }
          $releaseBody = @{
            tag_name = $tag
            name = "Release $tag"
            body = "Release automática generada por GitHub Actions."
            draft = $false
            prerelease = $false
          } | ConvertTo-Json

          try {
            $release = Invoke-RestMethod -Method Post -Uri "https://api.github.com/repos/$repo/releases" -Headers $headers -Body $releaseBody -ContentType "application/json"
          } catch {
            $release = Invoke-RestMethod -Method Get -Uri "https://api.github.com/repos/$repo/releases/tags/$tag" -Headers $headers
          }

          $uploadUrl = ($release.upload_url -replace '\{\?name,label\}', '')
          $existingAssets = @{}
          foreach ($asset in $release.assets) {
            $existingAssets[$asset.name] = $asset.id
          }
          $files = @(
            "dist\release\Facturion-Setup.exe",
            "dist\release\version.json",
            "dist\Facturion.exe"
          )

          foreach ($file in $files) {
            if (-not (Test-Path $file)) {
              throw "No se encontró el artefacto $file"
            }
            $name = [System.IO.Path]::GetFileName($file)
            if ($existingAssets.ContainsKey($name)) {
              Invoke-RestMethod -Method Delete -Uri "https://api.github.com/repos/$repo/releases/assets/$($existingAssets[$name])" -Headers $headers
            }
            $uri = "$uploadUrl?name=$name"
            $contentType = if ($name.EndsWith('.json')) { 'application/json' } else { 'application/octet-stream' }
            Invoke-RestMethod -Method Post -Uri $uri -Headers $headers -InFile $file -ContentType $contentType
          }
